name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Build universal app
        run: ./scripts/build-release.sh
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: YTLite-macOS
          path: dist/YTLite-*-macOS.zip
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/YTLite-*-macOS.zip --generate-notes --title "YTLite ${GITHUB_REF_NAME#v}"
